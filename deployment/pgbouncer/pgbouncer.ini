[databases]
; 数据库连接配置
; 格式: dbname = host=hostname port=port dbname=dbname
postgres = host=localhost port=5432 dbname=postgres

[pgbouncer]
; ============================================
; 监听配置
; ============================================

; 监听地址（* 表示所有接口）
listen_addr = 127.0.0.1

; 监听端口
listen_port = 6432

; ============================================
; 认证配置
; ============================================

; 认证类型: md5, scram-sha-256, plain, trust, any, hba, cert
auth_type = md5

; 认证文件路径
auth_file = /etc/pgbouncer/userlist.txt

; ============================================
; 连接池配置
; ============================================

; 连接池模式:
;   - session: 会话级别（一个客户端连接对应一个服务器连接）
;   - transaction: 事务级别（推荐，事务结束后释放连接）
;   - statement: 语句级别（每个语句结束后释放连接，不支持事务）
pool_mode = transaction

; 最大客户端连接数
max_client_conn = 1000

; 默认连接池大小（每个数据库的连接数）
default_pool_size = 25

; 保留连接池大小（额外的连接，用于处理突发流量）
reserve_pool_size = 5

; 保留连接池超时（秒）
reserve_pool_timeout = 3

; 最大数据库连接数（所有连接池的总和）
max_db_connections = 100

; 最大用户连接数（每个用户的最大连接数）
max_user_connections = 50

; ============================================
; 超时配置
; ============================================

; 服务器连接超时（秒）
server_connect_timeout = 15

; 服务器登录超时（秒）
server_login_retry = 15

; 查询超时（秒，0 表示禁用）
query_timeout = 0

; 查询等待超时（秒）
query_wait_timeout = 120

; 客户端空闲超时（秒）
client_idle_timeout = 0

; 服务器空闲超时（秒）
server_idle_timeout = 600

; 服务器生命周期（秒，0 表示禁用）
server_lifetime = 3600

; 服务器检查延迟（秒）
server_check_delay = 30

; ============================================
; 日志配置
; ============================================

; 日志连接
log_connections = 1

; 日志断开连接
log_disconnections = 1

; 日志连接池
log_pooler_errors = 1

; 日志统计信息
log_stats = 1

; 统计周期（秒）
stats_period = 60

; ============================================
; 管理配置
; ============================================

; 管理员用户（逗号分隔）
admin_users = postgres

; 统计用户（逗号分隔）
stats_users = postgres

; ============================================
; 性能优化
; ============================================

; 禁用 Nagle 算法（提高性能）
tcp_keepalive = 1
tcp_keepcnt = 3
tcp_keepidle = 60
tcp_keepintvl = 10

; 套接字缓冲区大小
so_reuseport = 1

; ============================================
; 安全配置
; ============================================

; 忽略启动参数（避免客户端设置影响服务器）
ignore_startup_parameters = extra_float_digits

; 应用名称添加到连接字符串
application_name_add_host = 1

; ============================================
; 其他配置
; ============================================

; PID 文件路径
pidfile = /var/run/pgbouncer/pgbouncer.pid

; Unix 套接字目录
unix_socket_dir = /var/run/postgresql

; Unix 套接字模式
unix_socket_mode = 0777

; ============================================
# 使用说明
# ============================================
#
# 1. 创建用户列表文件 /etc/pgbouncer/userlist.txt:
#    "postgres" "md5<password_hash>"
#
# 2. 生成密码哈希:
#    echo -n "passwordusername" | md5sum
#    然后在结果前加上 "md5" 前缀
#
# 3. 启动 PgBouncer:
#    pgbouncer -d /etc/pgbouncer/pgbouncer.ini
#
# 4. 连接到 PgBouncer:
#    psql -h 127.0.0.1 -p 6432 -U postgres postgres
#
# 5. 管理命令（连接到 pgbouncer 数据库）:
#    SHOW POOLS;        # 查看连接池状态
#    SHOW CLIENTS;      # 查看客户端连接
#    SHOW SERVERS;      # 查看服务器连接
#    SHOW STATS;        # 查看统计信息
#    RELOAD;            # 重新加载配置
#    PAUSE;             # 暂停连接池
#    RESUME;            # 恢复连接池
#
# ============================================
