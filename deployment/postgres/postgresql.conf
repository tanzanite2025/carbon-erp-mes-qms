# ============================================
# Carbon ERP/MES PostgreSQL 生产环境优化配置
# ============================================
# 
# 适用于: 4核8GB 服务器
# PostgreSQL 版本: 15.x
#
# 使用方法:
#   1. 复制到 Docker 容器: /etc/postgresql/postgresql.conf
#   2. 或在 docker-compose.yml 中挂载
#   3. 重启 PostgreSQL
#
# ============================================

# ============================================
# 连接设置
# ============================================

# 最大连接数（建议: CPU核心数 * 50）
max_connections = 200

# 监听地址
listen_addresses = '*'

# 端口
port = 5432

# ============================================
# 内存设置
# ============================================

# 共享缓冲区（建议: 总内存的 25%）
# 8GB * 0.25 = 2GB
shared_buffers = 2GB

# 有效缓存大小（建议: 总内存的 75%）
# 8GB * 0.75 = 6GB
effective_cache_size = 6GB

# 维护工作内存（建议: 总内存的 5-10%）
# 8GB * 0.0625 = 512MB
maintenance_work_mem = 512MB

# 工作内存（建议: (总内存 - shared_buffers) / max_connections）
# (8GB - 2GB) / 200 = 30MB，保守设置为 10MB
work_mem = 10MB

# ============================================
# WAL (Write-Ahead Logging) 设置
# ============================================

# WAL 缓冲区
wal_buffers = 16MB

# 最小 WAL 大小
min_wal_size = 1GB

# 最大 WAL 大小
max_wal_size = 4GB

# 检查点完成目标（0-1，建议 0.9）
checkpoint_completion_target = 0.9

# WAL 级别（replica 支持主从复制）
wal_level = replica

# ============================================
# 查询优化
# ============================================

# 默认统计目标（100-1000，越高越精确但越慢）
default_statistics_target = 100

# 随机页面成本（SSD 建议 1.1，HDD 建议 4.0）
random_page_cost = 1.1

# 有效 I/O 并发（SSD 建议 200，HDD 建议 2）
effective_io_concurrency = 200

# ============================================
# 并行查询
# ============================================

# 最大工作进程数（建议: CPU 核心数）
max_worker_processes = 4

# 每个查询的最大并行工作进程数
max_parallel_workers_per_gather = 2

# 最大并行工作进程数
max_parallel_workers = 4

# 最大并行维护工作进程数
max_parallel_maintenance_workers = 2

# ============================================
# 日志设置
# ============================================

# 日志目标
logging_collector = on

# 日志目录
log_directory = 'log'

# 日志文件名
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'

# 日志轮转
log_rotation_age = 1d
log_rotation_size = 100MB

# 日志保留
log_truncate_on_rotation = off

# 日志级别
log_min_duration_statement = 1000  # 记录执行时间超过 1 秒的查询

# 日志内容
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_duration = off
log_lock_waits = on
log_statement = 'ddl'  # 记录 DDL 语句
log_temp_files = 0     # 记录所有临时文件

# ============================================
# 自动清理 (Autovacuum)
# ============================================

# 启用自动清理
autovacuum = on

# 自动清理最大工作进程数
autovacuum_max_workers = 3

# 自动清理延迟
autovacuum_naptime = 1min

# 自动清理阈值
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# 自动清理比例因子
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ============================================
# 锁管理
# ============================================

# 死锁超时
deadlock_timeout = 1s

# 最大锁数
max_locks_per_transaction = 64

# ============================================
# 客户端连接默认值
# ============================================

# 时区
timezone = 'Asia/Shanghai'

# 日期格式
datestyle = 'iso, mdy'

# 字符集
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'

# 默认文本搜索配置
default_text_search_config = 'pg_catalog.english'

# ============================================
# 性能监控
# ============================================

# 启用查询统计
shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements 配置
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# 跟踪活动查询
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# ============================================
# 安全设置
# ============================================

# SSL（如果需要）
# ssl = on
# ssl_cert_file = '/path/to/server.crt'
# ssl_key_file = '/path/to/server.key'

# 密码加密
password_encryption = scram-sha-256

# ============================================
# 备份和恢复
# ============================================

# 归档模式（如果需要 PITR）
# archive_mode = on
# archive_command = 'cp %p /var/lib/postgresql/archive/%f'

# ============================================
# 其他优化
# ============================================

# 启用 JIT 编译（PostgreSQL 11+）
jit = on

# 共享内存类型
dynamic_shared_memory_type = posix

# 最大预备事务数
max_prepared_transactions = 0

# ============================================
# 说明
# ============================================
#
# 1. 这些配置针对 4核8GB 服务器优化
# 2. 如果服务器配置不同，需要相应调整
# 3. 修改配置后需要重启 PostgreSQL
# 4. 可以使用 PGTune 工具生成配置: https://pgtune.leopard.in.ua/
# 5. 定期监控性能指标，根据实际情况调整
#
# ============================================
