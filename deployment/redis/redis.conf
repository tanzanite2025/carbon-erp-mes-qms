# ============================================
# Carbon ERP/MES Redis 生产环境配置
# ============================================

# ============================================
# 网络配置
# ============================================

# 绑定地址
bind 127.0.0.1

# 端口
port 6379

# TCP 连接队列长度
tcp-backlog 511

# 超时时间（秒，0 表示禁用）
timeout 0

# TCP keepalive
tcp-keepalive 300

# ============================================
# 通用配置
# ============================================

# 守护进程模式
daemonize no

# PID 文件
pidfile /var/run/redis_6379.pid

# 日志级别: debug, verbose, notice, warning
loglevel notice

# 日志文件
logfile ""

# 数据库数量
databases 16

# ============================================
# 持久化配置
# ============================================

# RDB 快照
save 900 1      # 900 秒内至少 1 个键变化
save 300 10     # 300 秒内至少 10 个键变化
save 60 10000   # 60 秒内至少 10000 个键变化

# RDB 文件名
dbfilename dump.rdb

# 工作目录
dir /data

# RDB 压缩
rdbcompression yes

# RDB 校验
rdbchecksum yes

# AOF 持久化（推荐开启）
appendonly yes

# AOF 文件名
appendfilename "appendonly.aof"

# AOF 同步策略
# - always: 每次写入都同步（最安全，最慢）
# - everysec: 每秒同步一次（推荐，平衡性能和安全）
# - no: 由操作系统决定（最快，最不安全）
appendfsync everysec

# AOF 重写
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ============================================
# 内存管理
# ============================================

# 最大内存（建议设置为服务器内存的 10-20%）
maxmemory 512mb

# 内存淘汰策略
# - noeviction: 不淘汰，内存满时返回错误
# - allkeys-lru: 淘汰最近最少使用的键（推荐）
# - allkeys-lfu: 淘汰最不常用的键
# - volatile-lru: 淘汰设置了过期时间的最近最少使用的键
# - volatile-lfu: 淘汰设置了过期时间的最不常用的键
# - allkeys-random: 随机淘汰键
# - volatile-random: 随机淘汰设置了过期时间的键
# - volatile-ttl: 淘汰即将过期的键
maxmemory-policy allkeys-lru

# 淘汰样本数
maxmemory-samples 5

# ============================================
# 安全配置
# ============================================

# 密码认证（生产环境必须设置）
# requirepass your-strong-password-here

# 重命名危险命令
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""

# ============================================
# 客户端配置
# ============================================

# 最大客户端连接数
maxclients 10000

# ============================================
# 慢查询日志
# ============================================

# 慢查询阈值（微秒）
slowlog-log-slower-than 10000

# 慢查询日志长度
slowlog-max-len 128

# ============================================
# 高级配置
# ============================================

# 哈希表优化
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# 列表优化
list-max-ziplist-size -2
list-compress-depth 0

# 集合优化
set-max-intset-entries 512

# 有序集合优化
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog 优化
hll-sparse-max-bytes 3000

# 流优化
stream-node-max-bytes 4096
stream-node-max-entries 100

# 活跃碎片整理
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25

# ============================================
# 说明
# ============================================
#
# 1. 这些配置针对生产环境优化
# 2. 必须设置 requirepass 密码
# 3. 建议启用 AOF 持久化
# 4. 根据实际内存大小调整 maxmemory
# 5. 定期监控 Redis 性能指标
#
# ============================================
