# Carbon ERP/MES Nginx 主配置文件

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 基础配置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # 客户端配置
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # 缓存配置
    proxy_cache_path /var/cache/nginx/carbon 
                     levels=1:2 
                     keys_zone=carbon_cache:10m 
                     max_size=1g 
                     inactive=60m 
                     use_temp_path=off;

    # 限流配置
    limit_req_zone $binary_remote_addr zone=carbon_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=carbon_login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=carbon_conn:10m;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # Brotli 压缩 (如果安装了 brotli 模块)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # 上游服务器配置
    upstream carbon_erp {
        least_conn;
        server 127.0.0.1:4000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream carbon_mes {
        least_conn;
        server 127.0.0.1:4001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # 包含站点配置
    include /etc/nginx/sites-enabled/*;
}
