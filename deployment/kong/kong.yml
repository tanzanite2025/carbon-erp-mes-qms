_format_version: "2.1"

# Kong API Gateway 配置
# 用于 Supabase 服务路由

services:
  # Auth 服务
  - name: auth-service
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1
        strip_path: false
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Client-Info
          exposed_headers:
            - X-Total-Count
          credentials: true
          max_age: 3600

  # REST API 服务
  - name: rest-service
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1
        strip_path: true
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Client-Info
            - Prefer
          exposed_headers:
            - X-Total-Count
            - Content-Range
          credentials: true
          max_age: 3600

  # Storage 服务
  - name: storage-service
    url: http://storage:5000
    routes:
      - name: storage-route
        paths:
          - /storage/v1
        strip_path: true
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Client-Info
            - Cache-Control
          exposed_headers:
            - X-Total-Count
          credentials: true
          max_age: 3600

  # Realtime 服务
  - name: realtime-service
    url: http://realtime:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime/v1
        strip_path: true
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Client-Info
          exposed_headers:
            - X-Total-Count
          credentials: true
          max_age: 3600

# 全局插件
plugins:
  # 请求转换
  - name: request-transformer
    config:
      add:
        headers:
          - X-Forwarded-Host:$host
          - X-Forwarded-Proto:$scheme

  # 限流
  - name: rate-limiting
    config:
      minute: 60
      hour: 1000
      policy: local
